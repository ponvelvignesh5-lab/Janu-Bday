<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Janu Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FCE7F3,#FDF2F8,#EDE9FE);
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.15);
}

h2{
color:#C2185B;
margin-bottom:10px;
}

p{
color:#666;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

button{
width:100%;
padding:13px;
background:#E91E63;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#C2185B;
}

.footer{
margin-top:20px;
font-size:13px;
color:#777;
}
</style>

</head>

<body>

<div class="login-box">

<h2>👑 Hey Janu..  Login Pannu! </h2>

<p> ✨</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Begin </button>

<div class="footer">
7-7-2001
</div>

</div>

<script>

function login(){

var user=document.getElementById("username").value;

var pass=document.getElementById("password").value;

if(user=="Janu" && pass=="Maharani"){

window.location="eyes.html";

}
else{

alert("Oops! Wrong Username or Password 😊");

}

}

</script>

</body>
</html>
