<!DOCTYPE html>
<html>
<head>
    <title>Eyes</title>
    <style>
        body{
            background:#f75c8d;
            font-family:Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            width:600px;
            padding:20px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        img{
            width:100%;
            border-radius:10px;
        }

        h2{
            color:#d63384;
        }

        p{
            font-size:18px;
            line-height:1.6;
        }
    </style>
</head>

<body>

<div class="card">

<h2>JK ❤️</h2>

<img src="images/Eyes.jpg.jpeg" alt="Eyes">

<p>
Some eyes don't just sparkle, they quietly become a memory.
Some smiles don't just appear, they stay in someone's heart.
On your birthday, may your eyes always shine with happiness.
</p>

<h3>Happy Birthday 🎂</h3>

</div>

</body>
</html>
